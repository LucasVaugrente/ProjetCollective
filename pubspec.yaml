name: factoscope
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5
  sqflite: ^2.0.0+4
  path: ^1.8.0
  get_it: ^9.2.1
  flutter_svg: ^2.2.4
  http: ^1.1.0
  cupertino_icons: ^1.0.9
  video_player: ^2.11.1
  audioplayers: ^6.6.0
  go_router: ^17.1.0
  path_provider: ^2.1.2
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.2.0  
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon_android.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/assets/
